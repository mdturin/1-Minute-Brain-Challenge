<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background gradient: deep violet → indigo -->
    <radialGradient id="bgGrad" cx="50%" cy="48%" r="70%">
      <stop offset="0%"   stop-color="#4c1d95"/>
      <stop offset="45%"  stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </radialGradient>

    <!-- Inner glow disc behind brain -->
    <radialGradient id="glowDisc" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Brain fill gradient -->
    <linearGradient id="brainFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Brain stroke gradient -->
    <linearGradient id="brainStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Bolt gradient: warm gold → amber -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Bolt glow filter -->
    <filter id="boltBloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Brain outer glow -->
    <filter id="brainGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse ring filter -->
    <filter id="ringGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="512" height="512" fill="url(#dots)"/>

  <!-- ── GLOW DISC (behind brain) ── -->
  <ellipse cx="256" cy="245" rx="180" ry="165" fill="url(#glowDisc)"/>

  <!-- ── PULSE RINGS ── -->
  <ellipse cx="256" cy="245" rx="155" ry="142" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" filter="url(#ringGlow)"/>
  <ellipse cx="256" cy="245" rx="185" ry="170" fill="none" stroke="#6d28d9" stroke-width="1"   opacity="0.18" filter="url(#ringGlow)"/>

  <!-- ── BRAIN ── -->
  <!--
    Two-hemisphere brain: smooth, chunky, rounded.
    Built from two mirrored halves joined at the corpus callosum.
  -->
  <g filter="url(#brainGlow)">
    <path
      d="
        M256,110
        C240,110 224,116 214,128
        C202,120 186,118 172,126
        C156,118 138,122 126,134
        C112,130 98,138  92,152
        C80, 150 70,160  68,174
        C60,180  56,194  62,208
        C58,222  62,238  72,248
        C68,262  72,278  82,288
        C88,304 100,314 116,318
        C122,334 136,344 154,346
        C166,358 182,364 200,362
        C214,372 234,376 256,376
        C278,376 298,372 312,362
        C330,364 346,358 358,346
        C376,344 390,334 396,318
        C412,314 424,304 430,288
        C440,278 444,262 440,248
        C450,238 454,222 450,208
        C456,194 452,180 444,174
        C442,160 432,150 418,152
        C412,138 398,130 384,134
        C372,122 354,118 338,126
        C324,118 308,120 296,128
        C286,116 270,110 256,110
        Z
      "
      fill="url(#brainFill)"
      stroke="url(#brainStroke)"
      stroke-width="6"
      stroke-linejoin="round"
    />

    <!-- Corpus callosum divider -->
    <line x1="256" y1="122" x2="256" y2="366"
          stroke="#a5b4fc" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.35"/>

    <!-- Left hemisphere folds -->
    <path d="M170 165 C158 182 156 202 162 220" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M140 210 C132 228 134 250 142 266" stroke="#c4b5fd" stroke-width="3"   stroke-linecap="round" fill="none" opacity="0.38"/>
    <path d="M166 280 C158 296 160 314 170 326" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Right hemisphere folds -->
    <path d="M342 165 C354 182 356 202 350 220" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M372 210 C380 228 378 250 370 266" stroke="#c4b5fd" stroke-width="3"   stroke-linecap="round" fill="none" opacity="0.38"/>
    <path d="M346 280 C354 296 352 314 342 326" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  </g>

  <!-- ── LIGHTNING BOLT ── -->
  <!-- Large, centred, golden — the hero element -->
  <g filter="url(#boltBloom)">
    <path
      d="M272,142 L224,258 L258,258 L240,374 L296,244 L260,244 Z"
      fill="url(#boltGrad)"
      stroke="#fde68a"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>

</svg>
</body>
</html>
